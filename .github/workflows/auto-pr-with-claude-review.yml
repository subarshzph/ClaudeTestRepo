name: Auto PR Creator with Claude Review

on:
  push:
    branches-ignore:
      - main

# When this workflow creates a PR, the pull_request:opened event fires and
# claude-code-review.yml picks it up automatically — no need to invoke
# claude-code-action here (it rejects non-PR event types).

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify branch is up to date with main
        run: |
          git fetch origin main
          BEHIND=$(git rev-list HEAD..origin/main --count)
          if [ "$BEHIND" -gt 0 ]; then
            echo "::error::Branch '${{ github.ref_name }}' is $BEHIND commit(s) behind main. Rebase or merge main before pushing."
            exit 1
          fi
          echo "Branch is up to date with main."

      - name: Create or get PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          AHEAD=$(git rev-list origin/main..HEAD --count)
          if [ "$AHEAD" -eq 0 ]; then
            echo "No commits ahead of main — skipping PR creation."
            exit 0
          fi

          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH"
          else
            TITLE=$(echo "$BRANCH" | sed 's|[/_-]| |g')
            PR_URL=$(gh pr create \
              --title "$TITLE" \
              --body "Auto-generated PR from branch \`$BRANCH\`." \
              --base main \
              --head "$BRANCH")
            echo "Created PR: $PR_URL"
          fi
